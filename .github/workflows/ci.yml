name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    name: Frontend (tests + build + bundle budgets)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Node 22 is the current LTS and exposes `globalThis.navigator`
          # (Node 21+), matching what contributors run locally. Node 20
          # tripped clipboard.js's navigator access until we added a
          # typeof guard.
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run vitest suite
        run: npm test -- --run

      - name: Build production bundle
        run: npm run build

      - name: Enforce bundle-size budgets
        run: npm run check:bundle-size
