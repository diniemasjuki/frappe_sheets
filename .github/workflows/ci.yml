name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    name: Frontend (tests + build + bundle budgets)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Node 22 is the current LTS and exposes `globalThis.navigator`
          # (Node 21+), matching what contributors run locally. Node 20
          # tripped clipboard.js's navigator access until we added a
          # typeof guard.
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run vitest suite
        run: npm test -- --run

      - name: Build production bundle
        run: npm run build

      - name: Enforce bundle-size budgets
        run: npm run check:bundle-size

  e2e:
    name: Playwright E2E (real Frappe backend)
    runs-on: ubuntu-22.04
    timeout-minutes: 25

    services:
      mariadb:
        image: mariadb:10.6
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout spreadsheet
        uses: actions/checkout@v4
        with:
          path: spreadsheet

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            mariadb-client \
            libmariadb-dev \
            redis-tools \
            wkhtmltopdf

      - name: Configure MariaDB for Frappe
        run: |
          mysql -h 127.0.0.1 -uroot -proot -e "
            SET GLOBAL character_set_server = 'utf8mb4';
            SET GLOBAL collation_server     = 'utf8mb4_unicode_ci';
          "
          echo "127.0.0.1 test_site" | sudo tee -a /etc/hosts

      - name: Install frappe-bench
        run: pip install frappe-bench

      - name: Initialize bench
        run: |
          bench init \
            --skip-redis-config-generation \
            --skip-assets \
            --python "$(which python)" \
            --frappe-branch version-15 \
            frappe-bench

      - name: Point bench at service containers
        working-directory: frappe-bench
        run: |
          bench set-config -g db_host 127.0.0.1
          bench set-config -g redis_cache    redis://127.0.0.1:6379
          bench set-config -g redis_queue    redis://127.0.0.1:6379
          bench set-config -g redis_socketio redis://127.0.0.1:6379
          # Point bench's Procfile at host-mode redis too
          sed -i '/redis/d' ./Procfile

      - name: Add local spreadsheet app to bench
        working-directory: frappe-bench
        # `bench get-app` handles the three things a manual symlink misses:
        # registering the app in sites/apps.txt, installing it into the
        # bench's venv, and resolving its hooks. Pointing it at the local
        # checkout (rather than a git URL) makes it test exactly what's
        # in this commit.
        run: bench get-app spreadsheet "$GITHUB_WORKSPACE/spreadsheet" --skip-assets

      - name: Create test site and install app
        working-directory: frappe-bench
        run: |
          bench new-site test_site \
            --mariadb-root-password root \
            --admin-password admin \
            --mariadb-user-host-login-scope='%'
          bench --site test_site install-app spreadsheet
          bench --site test_site set-config developer_mode 1
          bench --site test_site clear-cache
          bench use test_site

      - name: Build frontend assets
        # `bench get-app` copies the app into frappe-bench/apps/spreadsheet, and
        # Frappe serves /assets/spreadsheet/... from THAT copy — not from the
        # original $GITHUB_WORKSPACE/spreadsheet checkout. Build inside the bench
        # copy so the JS/CSS bundles land where the web server can see them.
        working-directory: frappe-bench/apps/spreadsheet/frontend
        run: |
          npm ci
          npm run build

      - name: Create /assets symlinks for built bundles
        # Werkzeug (used by `bench start`) serves /assets/<app>/... from
        # sites/assets/<app>/, which is a symlink into the app's public/
        # folder. `bench init --skip-assets` and `bench get-app --skip-assets`
        # both skip creating it, so without this step the JS bundle 404s and
        # #root never mounts.
        working-directory: frappe-bench
        run: bench build --app spreadsheet

      - name: Start bench in background
        working-directory: frappe-bench
        run: |
          nohup bench start > bench.log 2>&1 &
          echo $! > bench.pid
          # Wait for the web server to respond
          for i in $(seq 1 60); do
            if curl -fsS -o /dev/null http://test_site:8000/api/method/ping; then
              echo "Bench up after ${i}s"
              exit 0
            fi
            sleep 2
          done
          echo "Bench failed to start; recent log:"
          tail -200 bench.log
          exit 1

      - name: Install Playwright browsers
        working-directory: frappe-bench/apps/spreadsheet/frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: frappe-bench/apps/spreadsheet/frontend
        env:
          PLAYWRIGHT_BASE_URL: http://test_site:8000
          FRAPPE_ADMIN_USER: Administrator
          FRAPPE_ADMIN_PASSWORD: admin
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frappe-bench/apps/spreadsheet/frontend/playwright-report/
          retention-days: 7

      - name: Upload Playwright test-results (traces, screenshots, videos)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: frappe-bench/apps/spreadsheet/frontend/test-results/
          retention-days: 7

      - name: Upload bench log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bench-log
          path: frappe-bench/bench.log
          retention-days: 7
